ru:
  tg_msg:
    unpaid:
      main: "📌 Проверьте заказ перед оплатой:\n\n📦 Состав заказа:\n\n%{items}\n\nДанные для доставки:\n\n👤 %{fio}\n🏠 %{address}, %{postal_code}\n📞 %{phone}\n\n💸 Реквизиты для оплаты:\n\nБанк: %{bank}\nНомер карты: `%{card}`\nПолучатель: `%{fio_card}`\nСумма к оплате: `%{price}` ₽"
      msg: "🎉 Ваш заказ №%{order} принят."
      footer: "❗️На оплату дается 30 минут!\nВ случае, если вы не оплатите в течении 30 минут, платеж не будет зачислен!\nПосле оплаты ОБЯЗАТЕЛЬНО НАЖМИТЕ «Я оплатил»"
      reminder:
        one: "⏰ Напоминаем об оплате заказа №%{order}\n\nОплата по вашему заказу ещё не поступила. Если оплата не будет получена в течение 20 мин., резерв будет снят и заказ автоматически отменён."
        two: "⚠️ Ваш заказ №%{order} может быть отменён\n\nОплата по вашему заказу ещё не поступила. Если оплата не будет получена в течение 10 мин., резерв будет снят и заказ автоматически отменён."
        overdue: "❌ Ваш заказ №%{order} отменён.\n\nМы не получили оплату в установленное время, поэтому резерв на товар был снят, и заказ отменён.\n\nЕсли вы хотите оформить новый заказ - повторите покупку через каталог."
        footer: "❗️После оплаты ОБЯЗАТЕЛЬНО НАЖМИТЕ «Я оплатил»"
    cancel: "❌ Ваш заказ №%{order} отменён.\n\nЕсли вы хотите оформить новый заказ, повторите покупку через каталог.\nВаш лимит на отмену платежа: %{limit} раз."
    paid_admin: "Надо проверить оплату по заказу №%{order}\n\nИтого отправил клиент: %{price}₽\n\nБанк: %{card}\n\n📄 Состав заказа:\n%{items}\n\n📍 Адрес:\n%{address}\n\n👤 ФИО:\n%{fio}\n\n📱 Телефон:\n%{phone}"
    paid_client: "⏳ Идет проверка вашего перевода в платежной системе.\n\nПожалуйста, ожидайте – как только мы подтвердим оплату, вы получите уведомление здесь.\n\nМаксимальное время ожидания 10 минут."
    approved_pay: "🎉 Подтвержден платеж для заказа №%{order}(%{fio})."
    on_processing_client: "❤️ Благодарим вас за покупку!\n\n🚚 Заказ №%{order} находится у курьера и готовится к отправке.\n\nКак только посылка будет отправлена, мы незамедлительно вышлем вам трек-номер для отслеживания.\n\nПроцесс отправки занимает от 5 до 48 часов.\n\nБудем признательны за ваше терпение!"
    on_processing_courier: "👀 Нужно отправить заказ №%{order}\n\n📄 Состав заказа:\n%{items}\n\n📍 Адрес:\n`%{address}`\n\n📍 Индекс: `%{postal_code}`\n\n👤 ФИО:\n`%{fio}`\n\n📱 Телефон:\n`%{phone}`\n\n🌟━━━━━━━━━━━━🌟"
    track_num_save: "✅ Готово! Трек-номер отправлен клиенту.\n\nТрек-номер: %{num}\n\nЗаказ №%{order}\n\nКлиент: %{fio}"
    on_shipped_courier: "✅ Заказ №%{order}\n\n📦 Посылка отправлена!\n\nВаш трек-номер: %{track}\n\n📄 Состав заказа:\n%{items}\n\n📍 Адрес:\n%{address}\n\n👤 ФИО:\n%{fio}\n\n📱 Телефон:\n%{phone}"
    set_track_num: "Введите трек-номер для заказа №%{order}\n\n👤 ФИО:\n%{fio}\n\nв чат:"
    error_data: "Не верные данные!"
    review: "Здравствуйте!\n\nВсе ли прошло хорошо с доставкой %{product}?\n\n*Нам очень важно ваше мнение!*\n\nПожалуйста, оставьте отзыв."
    review_mirena: "Здравствуйте!\n\n*Все ли прошло хорошо с доставкой?*\n\nБыло бы здорово, если бы вы поделились своим опытом – это поможет другим покупателям!"
