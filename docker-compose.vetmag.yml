services:
  base: &base
    image: vetmag
    build: .
    env_file: ./.env
    volumes:
      - gems:/usr/local/bundle
      - .:/app

  vetmag:
    <<: *base
    container_name: vetmag
    hostname: vetmag
    depends_on:
      - pg
      - redis
    entrypoint: ["./bin/docker-entrypoint"]
    networks:
      net:
      proxy-net:
        ipv4_address: 172.29.0.6
    restart: always

  sidekiq:
    <<: *base
    container_name: vetmag-sidekiq
    hostname: vetmag-sidekiq
    depends_on:
      - pg
      - redis
    entrypoint: []
    environment:
      SIDEKIQ_QUEUE: telegram_bot
    command: [ 'bundle', 'exec', 'sidekiq' ]
    networks:
      net:
    restart: always

  pg:
    image: postgres:16.1
    container_name: vetmag-pg
    hostname: pg
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      TZ: Europe/Moscow
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - net
    restart: unless-stopped

  redis:
    image: redis:7.4.2-alpine3.21
    container_name: vetmag-redis
    command: redis-server
    restart: unless-stopped
    networks:
      - net
    volumes:
      - redis:/data

volumes:
  db_data:
  redis:
  gems:

networks:
  net:
  proxy-net:
    external: true